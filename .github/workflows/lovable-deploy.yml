name: "Build e Deploy para GitHub Pages"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4

      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: "Instalar Dependencias"
        run: npm install

      - name: "Rodar Build"
        run: npm run build

      - name: "Localizar shell do TanStack Start (SPA mode)"
        id: locate-shell
        run: |
          if [ -f dist/client/_shell.html ]; then
            echo "deploy_dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -f dist/_shell.html ]; then
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "::error::_shell.html nao encontrado em dist/ ou dist/client/."
            exit 1
          fi

      - name: "Preparar arquivos para GitHub Pages (SPA fallback + .nojekyll)"
        run: |
          DIR="${{ steps.locate-shell.outputs.deploy_dir }}"
          # GitHub Pages serve index.html por padrao; usamos o shell do TanStack Start.
          cp "$DIR/_shell.html" "$DIR/index.html"
          # 404.html com o mesmo shell garante o SPA fallback para rotas client-side.
          cp "$DIR/_shell.html" "$DIR/404.html"
          # Impede o Jekyll de ignorar arquivos que comecam com _ (ex: _shell.html, _build/).
          touch "$DIR/.nojekyll"

      - name: "Upload do artefato do Pages"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.locate-shell.outputs.deploy_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy para GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
