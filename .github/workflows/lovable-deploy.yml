name: "Build e Deploy para stable-website"

on:
  # Aciona o workflow em pushes para a branch 'main'
  push:
    branches:
      - main
  # Permite rodar este workflow manualmente pela aba Actions (com opção de dry-run)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: só simula o deploy FTP (lista o que seria enviado/removido) e não altera a KingHost."
        type: boolean
        required: false
        default: false
      reset_sync_state:
        description: "Apagar .ftp-deploy-sync-state.json remoto antes do deploy (força re-envio completo, corrige uploads ignorados)."
        type: boolean
        required: true
        default: true

# Define permissoes para o GITHUB_TOKEN
# A permissao 'write' e necessaria para fazer push para a branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Faz o checkout do codigo do seu repositorio
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4
      
      # 2. Configura o ambiente Node.js
      # (Esta e a forma moderna de usar "npm" no GitHub Actions)
      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # 3. Instala as dependencias
      # (Usa 'npm install' para suportar repos sem package-lock.json)
      - name: "Instalar Dependencias"
        run: npm install
      
      # 4. Roda o script de build (que deve gerar a pasta 'dist')
      - name: "Rodar Build"
        run: npm run build

      # 5. Localiza o shell SPA do TanStack Start (pode variar entre dist/ e dist/client/)
      - name: "Localizar shell do TanStack Start (SPA mode)"
        id: locate-shell
        run: |
          if [ -f dist/client/_shell.html ]; then
            echo "deploy_dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -f dist/_shell.html ]; then
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "::error::_shell.html nao encontrado em dist/ ou dist/client/. Verifique se SPA mode esta habilitado em vite.config.ts: tanstackStart({ spa: { enabled: true } })"
            exit 1
          fi

      # 5.1. Gera .htaccess para hospedagens Apache (DirectoryIndex + SPA fallback)
      - name: "Gerar .htaccess para Apache"
        run: |
          cat > "${{ steps.locate-shell.outputs.deploy_dir }}/.htaccess" <<'HTACCESS'
          # TanStack Start SPA hospedado em Apache
          DirectoryIndex _shell.html

          RewriteEngine On

          # SPA fallback: rotas inexistentes caem no _shell.html
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ _shell.html [L]

          <IfModule mod_headers.c>
            <FilesMatch "_shell\.html$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
            <FilesMatch "\.(?:js|css|woff2|woff|svg|png|jpg|jpeg|webp|gif|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>
          HTACCESS

      # 6. Faz o deploy do output estatico para a branch 'stable-website'
      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # O token e injetado automaticamente pelo GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          # A branch para onde o deploy sera feito
          branch: stable-website
          # O diretorio que sera enviado para a branch (resolvido no step anterior)
          folder: ${{ steps.locate-shell.outputs.deploy_dir }}
          # Opcao para limpar arquivos antigos da branch 'stable-website'
          clean: true

      # 6.8. Define e valida a pasta pública remota do cPanel.
      #      Por padrão envia para /public_html/. Sobrescreva definindo o
      #      secret CPANEL_FTP_DIR (ex.: /public_html/site em subpastas).
      - name: "Definir pasta pública remota no cPanel (/public_html/)"
        id: detect-public-dir
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_DIR_SECRET: ${{ secrets.CPANEL_FTP_DIR }}
        run: |
          set -u
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          if [ -z "${FTP_HOST:-}" ] || [ -z "${FTP_USER:-}" ] || [ -z "${FTP_PASS:-}" ]; then
            echo "::error::Secrets CPANEL_FTP_HOST/USER/PASS ausentes. Configure-os em Settings → Secrets."
            exit 1
          fi

          # Alvo fixo: /public_html/ (raiz pública padrão do cPanel).
          # Sobrescreva com o secret CPANEL_FTP_DIR se seu site vive em subpasta.
          TARGET_DIR="${FTP_DIR_SECRET:-/public_html/}"
          echo "::notice::Destino do upload: $TARGET_DIR"

          # Valida que o diretório existe e é acessível
          OUT=$(lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:max-retries 1;
            set net:timeout 20;
            open -p 21 $FTP_HOST;
            cd \"$TARGET_DIR\";
            pwd;
            bye;
          " 2>&1) || true
          echo "$OUT"

          if ! echo "$OUT" | grep -Eq '^/'; then
            echo "::error::❌ Não foi possível acessar '$TARGET_DIR' no cPanel."
            echo "::error::Verifique credenciais FTP e/ou defina o secret CPANEL_FTP_DIR com o caminho absoluto correto."
            exit 1
          fi

          RESOLVED=$(echo "$OUT" | grep -E '^/' | tail -n1 | tr -d '\r')
          echo "✅ Diretório remoto validado. pwd → $RESOLVED"
          echo "public_dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
          echo "resolved_pwd=$RESOLVED" >> "$GITHUB_OUTPUT"


      # 6.9. Inspeciona o diretório remoto detectado ANTES do deploy
      - name: "Inspecionar diretório remoto no cPanel (pré-deploy)"
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
        run: |
          echo "::group::Destino resolvido"
          echo "Comprimento: ${#FTP_DIR} | começa com '/': $(case "$FTP_DIR" in /*) echo sim;; *) echo não;; esac) | contém 'www': $(case "$FTP_DIR" in *www*) echo sim;; *) echo não;; esac)"
          echo "SHA1-12: $(printf %s "$FTP_DIR" | sha1sum | cut -c1-12)"
          echo "::endgroup::"

          echo "::group::Listagem do diretório detectado"
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -p 21 $FTP_HOST;
            cd \"$FTP_DIR\" || (echo '::error::Não foi possível acessar o diretório detectado'; exit 1);
            pwd;
            echo '--- Conteúdo atual (antes do deploy): ---';
            ls -la;
            echo '--- Favicons presentes? ---';
            ls -la favicon-32x32.png apple-touch-icon.png favicon-16x16.png favicon-192x192.png favicon-512x512.png 2>&1 || true;
            echo '--- .htaccess presente? ---';
            ls -la .htaccess 2>&1 || true;
            bye;
          " || echo "::warning::Falha ao inspecionar diretório remoto."
          echo "::endgroup::"


      # 6.95. Dry-run: compara o build local com o remoto e lista arquivos que
      #       SERIAM enviados/atualizados/removidos, SEM alterar nada na KingHost.
      #       Roda sempre; se o usuário disparou o workflow com dry_run=true,
      #       o step de deploy real é pulado logo abaixo.
      - name: "Dry-run FTP (simulação — não altera o cPanel)"
        id: ftp-dry-run
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
          LOCAL_DIR: ${{ steps.locate-shell.outputs.deploy_dir }}
        run: |
          set -u
          echo "::group::Dry-run — configuração"
          echo "Local:  $LOCAL_DIR/"
          echo "Remoto: $FTP_DIR (SHA1-12 $(printf %s "$FTP_DIR" | sha1sum | cut -c1-12))"
          echo "Modo:   ${{ github.event.inputs.dry_run == 'true' && 'DRY-RUN (deploy real será pulado)' || 'preview antes do deploy real' }}"
          echo "::endgroup::"

          echo "::group::lftp mirror --dry-run (upload + delete-first, mesmas flags do deploy)"
          # Usa exatamente o mesmo conjunto de exclusões e o mesmo modo espelho
          # (--dangerous-clean-slate equivale a mirror -R --delete).
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 30;
            set net:max-retries 2;
            open -p 21 $FTP_HOST;
            lcd \"$LOCAL_DIR\";
            cd \"$FTP_DIR\";
            mirror --reverse --delete --verbose --dry-run \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              --exclude-glob .DS_Store;
            bye;
          " | tee /tmp/ftp-dry-run.log || {
            echo "::error::Falha ao executar dry-run via lftp."
            exit 1
          }
          echo "::endgroup::"

          echo "::group::Resumo do dry-run"
          uploads=$(grep -cE '^(Transferring file|put )' /tmp/ftp-dry-run.log || true)
          deletes=$(grep -cE '^(Removing (old file|old directory)|rm )' /tmp/ftp-dry-run.log || true)
          mkdirs=$(grep -cE '^(Making directory|mkdir )' /tmp/ftp-dry-run.log || true)
          echo "Arquivos que SERIAM enviados/atualizados: ${uploads:-0}"
          echo "Arquivos/pastas que SERIAM removidos:     ${deletes:-0}"
          echo "Pastas que SERIAM criadas:                ${mkdirs:-0}"
          echo "::endgroup::"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "::notice::🧪 DRY-RUN concluído. Nenhum arquivo foi alterado no cPanel. Rode o workflow novamente sem 'dry_run' para efetivar o deploy."
          fi

      # 6.97. Se solicitado, apaga o .ftp-deploy-sync-state.json remoto para
      #       forçar o próximo deploy a reenviar tudo (o ftp-deploy usa esse
      #       arquivo como cache; se ele estiver desatualizado, uploads novos
      #       podem ser ignorados silenciosamente).
      - name: "Resetar estado remoto do ftp-deploy (.ftp-deploy-sync-state.json)"
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.reset_sync_state == 'true'
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
        run: |
          echo "::group::Removendo .ftp-deploy-sync-state.json remoto"
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -p 21 $FTP_HOST;
            cd \"$FTP_DIR\" || (echo '::error::Não foi possível acessar $FTP_DIR'; exit 1);
            echo '--- Antes: ---';
            ls -la .ftp-deploy-sync-state.json 2>&1 || echo '(arquivo não existe — nada a fazer)';
            rm -f .ftp-deploy-sync-state.json;
            echo '--- Depois: ---';
            ls -la .ftp-deploy-sync-state.json 2>&1 || echo '(removido com sucesso)';
            bye;
          " && echo "::notice::🧹 Estado de sincronização remoto foi resetado. Próximo deploy reenviará tudo." \
             || echo "::warning::Falha ao remover .ftp-deploy-sync-state.json — o deploy seguirá mesmo assim."
          echo "::endgroup::"

      - name: "Deploy FTP para cPanel (com retry)"
        if: github.event.inputs.dry_run != 'true'
        id: ftp-deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          on_retry_command: echo "::warning::Tentativa de FTP falhou. Aguardando antes de tentar novamente..."
          command: |
            echo "::group::Tentativa de deploy FTP para cPanel"
            echo "Diretório local: ${{ steps.locate-shell.outputs.deploy_dir }}/"
            echo "Diretório remoto (auto-detectado): ${{ steps.detect-public-dir.outputs.public_dir }}"
            echo "Servidor: ${{ secrets.CPANEL_FTP_HOST }}"
            echo "Iniciando em: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "::endgroup::"

            npx --yes @samkirkland/ftp-deploy@4.3.5 \
              --server "${{ secrets.CPANEL_FTP_HOST }}" \
              --username "${{ secrets.CPANEL_FTP_USER }}" \
              --password "${{ secrets.CPANEL_FTP_PASS }}" \
              --local-dir "${{ steps.locate-shell.outputs.deploy_dir }}/" \
              --server-dir "${{ steps.detect-public-dir.outputs.public_dir }}" \
              --protocol ftps \
              --port 21 \
              --timeout 60000 \
              --log-level verbose \
              --dangerous-clean-slate true \
              --exclude "**/.git*" \
              --exclude "**/.git*/**" \
              --exclude "**/node_modules/**" \
              --exclude "**/.DS_Store"

            echo "Deploy FTP concluído em: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      # 7.1. Log final de status (roda mesmo se o step anterior falhar)
      - name: "Resumo do Deploy FTP"
        if: always()
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "::notice::🧪 Modo dry-run: deploy real foi pulado. Veja o resumo do step 'Dry-run FTP' acima."
          elif [ "${{ steps.ftp-deploy.outcome }}" = "success" ]; then
            echo "::notice::✅ Deploy FTP concluído com sucesso após ${{ steps.ftp-deploy.outputs.total_attempts || '1' }} tentativa(s)."
          else
            echo "::error::❌ Deploy FTP falhou após todas as tentativas. Verifique os logs verbosos acima (timeouts, credenciais, permissões de diretório, limite de conexões do cPanel)."
          fi

      # 7.5. Verifica via FTP que os favicons realmente aterrissaram no diretório remoto
      #      após o upload (comparando tamanho local vs remoto).
      - name: "Validar presença dos favicons no FTP remoto (pós-deploy)"
        if: steps.ftp-deploy.outcome == 'success'
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
          LOCAL_DIR: ${{ steps.locate-shell.outputs.deploy_dir }}
        run: |
          set -u
          FILES=("favicon-32x32.png" "apple-touch-icon.png" "nilda-logo.png")

          echo "::group::Listagem remota dos favicons"
          REMOTE_LS=$(lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -p 21 $FTP_HOST;
            cd \"$FTP_DIR\";
            ls -la ${FILES[*]};
            bye;
          " 2>&1)
          echo "$REMOTE_LS"
          echo "::endgroup::"

          ftp_failed=0
          for f in "${FILES[@]}"; do
            if ! echo "$REMOTE_LS" | grep -qE "[[:space:]]${f}$"; then
              echo "::error::Arquivo $f NÃO encontrado em $FTP_DIR após o deploy."
              ftp_failed=1
              continue
            fi
            # Extrai o tamanho remoto (5ª coluna do ls -la típico)
            remote_size=$(echo "$REMOTE_LS" | awk -v f="$f" '$NF==f {print $5; exit}')
            local_size=$(stat -c%s "$LOCAL_DIR/$f" 2>/dev/null || echo "?")
            echo "  $f: local=${local_size} bytes | remoto=${remote_size:-?} bytes"
            if [ -n "$remote_size" ] && [ "$remote_size" != "$local_size" ]; then
              echo "::error::Tamanho divergente para $f (local=$local_size, remoto=$remote_size)."
              ftp_failed=1
            fi
          done

          if [ "$ftp_failed" -ne 0 ]; then
            echo "::error::❌ Validação FTP pós-deploy falhou."
            exit 1
          fi
          echo "::notice::✅ Favicons presentes no diretório remoto com o tamanho esperado."

      # 7.6. Corrige permissões (chmod) pós-deploy: 644 para arquivos, 755 para pastas.
      #      Evita 403 Forbidden causados por umask do FTP (ex.: 600/700).
      #      OBS: ownership (chown) NÃO é possível via FTP — se o Apache
      #      rodar em user diferente, use o File Manager do cPanel → "Fix
      #      Permissions" ou abra um chamado no suporte da hospedagem.
      - name: "Corrigir permissões (chmod 644/755) no cPanel"
        if: steps.ftp-deploy.outcome == 'success'
        env:
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
        run: |
          set -u
          echo "::group::Aplicando chmod recursivo (644 arquivos, 755 pastas) em $FTP_DIR"
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 30;
            set net:max-retries 2;
            open -p 21 $FTP_HOST;
            cd \"$FTP_DIR\";
            # Pastas 755 (leitura + execução p/ Apache atravessar)
            find -d -type d -exec chmod 755 {} +;
            # Arquivos 644 (leitura para o Apache servir)
            find -type f -exec chmod 644 {} +;
            # .htaccess explicitamente 644 (alguns hosts exigem)
            chmod 644 .htaccess 2>/dev/null || true;
            echo '--- Permissões da raiz após chmod: ---';
            ls -la;
            echo '--- Permissões da pasta assets/: ---';
            ls -la assets/ 2>&1 || echo '(pasta assets/ não existe)';
            bye;
          " && echo "::notice::✅ Permissões corrigidas: 644 para arquivos, 755 para pastas." \
             || echo "::warning::Falha ao aplicar chmod — verifique se o servidor FTP suporta o comando SITE CHMOD."
          echo "::endgroup::"



      # 8. Verificação HTTP pós-deploy: exige content-type image/png exatamente
      - name: "Verificar favicons via HTTP (exige content-type image/png)"
        if: steps.ftp-deploy.outcome == 'success'
        env:
          VERIFY_BASE_URL: ${{ secrets.CPANEL_VERIFY_URL || 'https://nildacontabilidade.com.br' }}
        run: |
          set -u
          echo "Base URL de verificação: $VERIFY_BASE_URL"
          sleep 10  # propagação/cache

          paths=("/favicon-32x32.png" "/apple-touch-icon.png" "/nilda-logo.png")

          failed=0
          for p in "${paths[@]}"; do
            url="${VERIFY_BASE_URL%/}$p"
            echo "::group::Verificando $url"
            headers=$(curl -sSIL --max-time 30 "$url" || true)
            echo "$headers"

            ctype=$(echo "$headers" | awk 'BEGIN{IGNORECASE=1}/^content-type:/{v=$0} END{print v}' | tr -d '\r' | sed 's/^[Cc]ontent-[Tt]ype:[[:space:]]*//' | awk -F';' '{print tolower($1)}' | tr -d '[:space:]')
            status=$(echo "$headers" | awk '/^HTTP\//{s=$2} END{print s}')

            echo "Status: ${status:-desconhecido} | Content-Type: ${ctype:-desconhecido}"

            if [ -z "$status" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              echo "::error::$url retornou status HTTP $status."
              failed=1
            elif [ "$ctype" != "image/png" ]; then
              echo "::error::$url content-type='$ctype' — esperado exatamente 'image/png' (text/html indica SPA fallback; outro image/* indica servidor mal configurado)."
              failed=1
            else
              echo "::notice::✅ $url OK (image/png)"
            fi
            echo "::endgroup::"
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::❌ Validação HTTP pós-deploy falhou: favicons não estão sendo servidos como image/png."
            exit 1
          fi
          echo "::notice::✅ Todos os favicons retornam content-type image/png."
