name: "Build e Deploy para stable-website"

on:
  # Aciona o workflow em pushes para a branch 'main'
  push:
    branches:
      - main
  # Permite que você rode este workflow manualmente pela aba Actions
  workflow_dispatch:

# Define permissoes para o GITHUB_TOKEN
# A permissao 'write' e necessaria para fazer push para a branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Faz o checkout do codigo do seu repositorio
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4
      
      # 2. Configura o ambiente Node.js
      # (Esta e a forma moderna de usar "npm" no GitHub Actions)
      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # 3. Instala as dependencias
      # (Usa 'npm install' para suportar repos sem package-lock.json)
      - name: "Instalar Dependencias"
        run: npm install
      
      # 4. Roda o script de build (que deve gerar a pasta 'dist')
      - name: "Rodar Build"
        run: npm run build

      # 5. Localiza o shell SPA do TanStack Start (pode variar entre dist/ e dist/client/)
      - name: "Localizar shell do TanStack Start (SPA mode)"
        id: locate-shell
        run: |
          if [ -f dist/client/_shell.html ]; then
            echo "deploy_dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -f dist/_shell.html ]; then
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "::error::_shell.html nao encontrado em dist/ ou dist/client/. Verifique se SPA mode esta habilitado em vite.config.ts: tanstackStart({ spa: { enabled: true } })"
            exit 1
          fi

      # 5.1. Gera .htaccess para hospedagens Apache (DirectoryIndex + SPA fallback)
      - name: "Gerar .htaccess para Apache"
        run: |
          cat > "${{ steps.locate-shell.outputs.deploy_dir }}/.htaccess" <<'HTACCESS'
          # TanStack Start SPA hospedado em Apache
          DirectoryIndex _shell.html

          RewriteEngine On

          # SPA fallback: rotas inexistentes caem no _shell.html
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ _shell.html [L]

          <IfModule mod_headers.c>
            <FilesMatch "_shell\.html$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
            <FilesMatch "\.(?:js|css|woff2|woff|svg|png|jpg|jpeg|webp|gif|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>
          HTACCESS

      # 6. Faz o deploy do output estatico para a branch 'stable-website'
      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # O token e injetado automaticamente pelo GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          # A branch para onde o deploy sera feito
          branch: stable-website
          # O diretorio que sera enviado para a branch (resolvido no step anterior)
          folder: ${{ steps.locate-shell.outputs.deploy_dir }}
          # Opcao para limpar arquivos antigos da branch 'stable-website'
          clean: true

      # 6.9. Inspeciona o diretório remoto ANTES do deploy para confirmar destino correto
      - name: "Inspecionar diretório remoto na KingHost (pré-deploy)"
        env:
          FTP_HOST: ${{ secrets.KINGHOST_FTP_HOST }}
          FTP_USER: ${{ secrets.KINGHOST_FTP_USER }}
          FTP_PASS: ${{ secrets.KINGHOST_FTP_PASS }}
          FTP_DIR: ${{ secrets.KINGHOST_FTP_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          echo "::group::Configuração do destino FTP"
          # GitHub mascara o valor exato do secret, então imprimimos características
          # que ajudam a confirmar sem expor o valor no log.
          echo "Comprimento de KINGHOST_FTP_DIR: ${#FTP_DIR} caracteres"
          echo "Começa com '/': $(case "$FTP_DIR" in /*) echo sim;; *) echo NÃO - caminho relativo!;; esac)"
          echo "Termina com '/': $(case "$FTP_DIR" in */) echo sim;; *) echo não;; esac)"
          echo "Contém 'www': $(case "$FTP_DIR" in *www*) echo sim;; *) echo NÃO - verifique se é a raiz pública;; esac)"
          echo "Hash SHA1 (para comparar entre runs sem revelar): $(printf %s "$FTP_DIR" | sha1sum | cut -c1-12)"
          echo "::endgroup::"

          echo "::group::pwd remoto e listagem do diretório configurado"
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -p 21 $FTP_HOST;
            pwd;
            cd \"$FTP_DIR\" || (echo '::error::Não foi possível acessar KINGHOST_FTP_DIR'; exit 1);
            pwd;
            echo '--- Conteúdo atual (antes do deploy): ---';
            ls -la;
            echo '--- Favicons presentes? ---';
            ls -la favicon-32x32.png apple-touch-icon.png favicon-16x16.png favicon-192x192.png favicon-512x512.png 2>&1 || true;
            echo '--- .htaccess presente? ---';
            ls -la .htaccess 2>&1 || true;
            bye;
          " || echo "::warning::Falha ao inspecionar diretório remoto — verifique host/credenciais/porta."
          echo "::endgroup::"


      - name: "Deploy FTP para KingHost (com retry)"
        id: ftp-deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          on_retry_command: echo "::warning::Tentativa de FTP falhou. Aguardando antes de tentar novamente..."
          command: |
            echo "::group::Tentativa de deploy FTP para KingHost"
            echo "Diretório local: ${{ steps.locate-shell.outputs.deploy_dir }}/"
            echo "Diretório remoto: ${{ secrets.KINGHOST_FTP_DIR }}"
            echo "Servidor: ${{ secrets.KINGHOST_FTP_HOST }}"
            echo "Iniciando em: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "::endgroup::"

            npx --yes @samkirkland/ftp-deploy@4.3.5 \
              --server "${{ secrets.KINGHOST_FTP_HOST }}" \
              --username "${{ secrets.KINGHOST_FTP_USER }}" \
              --password "${{ secrets.KINGHOST_FTP_PASS }}" \
              --local-dir "${{ steps.locate-shell.outputs.deploy_dir }}/" \
              --server-dir "${{ secrets.KINGHOST_FTP_DIR }}" \
              --protocol ftps \
              --port 21 \
              --timeout 60000 \
              --log-level verbose \
              --dangerous-clean-slate true \
              --exclude "**/.git*" \
              --exclude "**/.git*/**" \
              --exclude "**/node_modules/**" \
              --exclude "**/.DS_Store"

            echo "Deploy FTP concluído em: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      # 7.1. Log final de status (roda mesmo se o step anterior falhar)
      - name: "Resumo do Deploy FTP"
        if: always()
        run: |
          if [ "${{ steps.ftp-deploy.outcome }}" = "success" ]; then
            echo "::notice::✅ Deploy FTP concluído com sucesso após ${{ steps.ftp-deploy.outputs.total_attempts || '1' }} tentativa(s)."
          else
            echo "::error::❌ Deploy FTP falhou após todas as tentativas. Verifique os logs verbosos acima (timeouts, credenciais, permissões de diretório, limite de conexões da KingHost)."
          fi

      # 8. Verificação pós-deploy: garante que os favicons são servidos como imagem
      #    (não caindo no SPA fallback com content-type text/html)
      - name: "Verificar favicons pós-deploy (falha se content-type=text/html)"
        if: steps.ftp-deploy.outcome == 'success'
        env:
          VERIFY_BASE_URL: ${{ secrets.KINGHOST_VERIFY_URL || 'https://nildacontabilidade.com.br' }}
        run: |
          set -u
          echo "Base URL de verificação: $VERIFY_BASE_URL"

          # Pequena espera para propagação (cache/CDN da hospedagem)
          sleep 10

          paths=(
            "/favicon-32x32.png"
            "/apple-touch-icon.png"
          )

          failed=0
          for p in "${paths[@]}"; do
            url="${VERIFY_BASE_URL%/}$p"
            echo "::group::Verificando $url"
            # -L segue redirects; -f não é usado para poder inspecionar respostas não-2xx
            headers=$(curl -sSIL --max-time 30 "$url" || true)
            echo "$headers"

            # Pega o último content-type (após redirects) e o último status HTTP
            ctype=$(echo "$headers" | awk 'BEGIN{IGNORECASE=1}/^content-type:/{v=$0} END{print v}' | tr -d '\r' | sed 's/^[Cc]ontent-[Tt]ype:[[:space:]]*//')
            status=$(echo "$headers" | awk '/^HTTP\//{s=$2} END{print s}')

            echo "Status: ${status:-desconhecido}"
            echo "Content-Type: ${ctype:-desconhecido}"

            if [ -z "$status" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              echo "::error::$url retornou status HTTP $status."
              failed=1
            elif echo "$ctype" | grep -qi 'text/html'; then
              echo "::error::$url está servindo text/html (SPA fallback) em vez de image/*. Deploy não entregou o arquivo real."
              failed=1
            elif ! echo "$ctype" | grep -qi '^image/'; then
              echo "::warning::$url retornou content-type inesperado ($ctype). Esperado image/*."
            else
              echo "::notice::✅ $url OK ($ctype)"
            fi
            echo "::endgroup::"
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::❌ Verificação pós-deploy falhou: pelo menos um favicon não está sendo servido como imagem."
            exit 1
          fi
          echo "::notice::✅ Todos os favicons verificados retornam content-type de imagem."