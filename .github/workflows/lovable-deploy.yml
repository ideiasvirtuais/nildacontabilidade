name: "Build e Deploy para stable-website"

on:
  # Aciona o workflow em pushes para a branch 'main'
  push:
    branches:
      - main
  # Permite rodar este workflow manualmente pela aba Actions (com opção de dry-run)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run: só simula o deploy FTP (lista o que seria enviado/removido) e não altera a KingHost."
        type: boolean
        required: false
        default: false

# Define permissoes para o GITHUB_TOKEN
# A permissao 'write' e necessaria para fazer push para a branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Faz o checkout do codigo do seu repositorio
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4
      
      # 2. Configura o ambiente Node.js
      # (Esta e a forma moderna de usar "npm" no GitHub Actions)
      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # 3. Instala as dependencias
      # (Usa 'npm install' para suportar repos sem package-lock.json)
      - name: "Instalar Dependencias"
        run: npm install
      
      # 4. Roda o script de build (que deve gerar a pasta 'dist')
      - name: "Rodar Build"
        run: npm run build

      # 5. Localiza o shell SPA do TanStack Start (pode variar entre dist/ e dist/client/)
      - name: "Localizar shell do TanStack Start (SPA mode)"
        id: locate-shell
        run: |
          if [ -f dist/client/_shell.html ]; then
            echo "deploy_dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -f dist/_shell.html ]; then
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "::error::_shell.html nao encontrado em dist/ ou dist/client/. Verifique se SPA mode esta habilitado em vite.config.ts: tanstackStart({ spa: { enabled: true } })"
            exit 1
          fi

      # 5.1. Gera .htaccess para hospedagens Apache (DirectoryIndex + SPA fallback)
      - name: "Gerar .htaccess para Apache"
        run: |
          cat > "${{ steps.locate-shell.outputs.deploy_dir }}/.htaccess" <<'HTACCESS'
          # TanStack Start SPA hospedado em Apache
          DirectoryIndex _shell.html

          RewriteEngine On

          # SPA fallback: rotas inexistentes caem no _shell.html
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ _shell.html [L]

          <IfModule mod_headers.c>
            <FilesMatch "_shell\.html$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
            <FilesMatch "\.(?:js|css|woff2|woff|svg|png|jpg|jpeg|webp|gif|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>
          HTACCESS

      # 6. Faz o deploy do output estatico para a branch 'stable-website'
      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # O token e injetado automaticamente pelo GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          # A branch para onde o deploy sera feito
          branch: stable-website
          # O diretorio que sera enviado para a branch (resolvido no step anterior)
          folder: ${{ steps.locate-shell.outputs.deploy_dir }}
          # Opcao para limpar arquivos antigos da branch 'stable-website'
          clean: true

      # 6.8. Detecta automaticamente a pasta pública na KingHost (ex.: /www)
      #      Se KINGHOST_FTP_DIR estiver definido, valida-o; caso contrário,
      #      tenta candidatos comuns. Aborta com mensagem clara se nada servir.
      - name: "Detectar pasta pública remota na KingHost"
        id: detect-public-dir
        env:
          FTP_HOST: ${{ secrets.KINGHOST_FTP_HOST }}
          FTP_USER: ${{ secrets.KINGHOST_FTP_USER }}
          FTP_PASS: ${{ secrets.KINGHOST_FTP_PASS }}
          FTP_DIR_SECRET: ${{ secrets.KINGHOST_FTP_DIR }}
        run: |
          set -u
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          if [ -z "${FTP_HOST:-}" ] || [ -z "${FTP_USER:-}" ] || [ -z "${FTP_PASS:-}" ]; then
            echo "::error::Secrets KINGHOST_FTP_HOST/USER/PASS ausentes. Configure-os em Settings → Secrets."
            exit 1
          fi

          # Lista candidatos: primeiro o secret (se houver), depois padrões da KingHost.
          CANDIDATES=()
          if [ -n "${FTP_DIR_SECRET:-}" ]; then
            CANDIDATES+=("$FTP_DIR_SECRET")
          fi
          CANDIDATES+=("/www" "www" "/htdocs" "htdocs" "/public_html" "public_html" "/httpdocs" "/")

          probe() {
            local dir="$1"
            lftp -u "$FTP_USER","$FTP_PASS" -e "
              set ssl:verify-certificate no;
              set ftp:ssl-force true;
              set ftp:ssl-protect-data true;
              set net:max-retries 1;
              set net:timeout 20;
              open -p 21 $FTP_HOST;
              cd \"$dir\";
              pwd;
              bye;
            " 2>&1
          }

          DETECTED=""
          for c in "${CANDIDATES[@]}"; do
            echo "::group::Testando candidato: $(printf %s "$c" | sha1sum | cut -c1-8) (len=${#c})"
            OUT=$(probe "$c" || true)
            echo "$OUT"
            # Aceita se o cd não retornou erro (procura por linha começando com /)
            if echo "$OUT" | grep -Eq '^/'; then
              RESOLVED=$(echo "$OUT" | grep -E '^/' | tail -n1 | tr -d '\r')
              echo "✅ Candidato acessível. pwd resolvido → $RESOLVED"
              DETECTED="$c"
              echo "resolved_pwd=$RESOLVED" >> "$GITHUB_OUTPUT"
              echo "::endgroup::"
              break
            else
              echo "❌ Candidato não acessível."
            fi
            echo "::endgroup::"
          done

          if [ -z "$DETECTED" ]; then
            echo "::error::❌ Não foi possível localizar a pasta pública na KingHost."
            echo "::error::Candidatos testados: KINGHOST_FTP_DIR (se definido), /www, www, /htdocs, htdocs, /public_html, public_html, /httpdocs, /."
            echo "::error::Ação: verifique credenciais/host, ou defina o secret KINGHOST_FTP_DIR com o caminho absoluto correto (ex.: /www)."
            exit 1
          fi

          echo "public_dir=$DETECTED" >> "$GITHUB_OUTPUT"
          echo "::notice::Pasta pública detectada (hash sha1-8): $(printf %s "$DETECTED" | sha1sum | cut -c1-8) — usada como server-dir do deploy."

      # 6.9. Inspeciona o diretório remoto detectado ANTES do deploy
      - name: "Inspecionar diretório remoto na KingHost (pré-deploy)"
        env:
          FTP_HOST: ${{ secrets.KINGHOST_FTP_HOST }}
          FTP_USER: ${{ secrets.KINGHOST_FTP_USER }}
          FTP_PASS: ${{ secrets.KINGHOST_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
        run: |
          echo "::group::Destino resolvido"
          echo "Comprimento: ${#FTP_DIR} | começa com '/': $(case "$FTP_DIR" in /*) echo sim;; *) echo não;; esac) | contém 'www': $(case "$FTP_DIR" in *www*) echo sim;; *) echo não;; esac)"
          echo "SHA1-12: $(printf %s "$FTP_DIR" | sha1sum | cut -c1-12)"
          echo "::endgroup::"

          echo "::group::Listagem do diretório detectado"
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -p 21 $FTP_HOST;
            cd \"$FTP_DIR\" || (echo '::error::Não foi possível acessar o diretório detectado'; exit 1);
            pwd;
            echo '--- Conteúdo atual (antes do deploy): ---';
            ls -la;
            echo '--- Favicons presentes? ---';
            ls -la favicon-32x32.png apple-touch-icon.png favicon-16x16.png favicon-192x192.png favicon-512x512.png 2>&1 || true;
            echo '--- .htaccess presente? ---';
            ls -la .htaccess 2>&1 || true;
            bye;
          " || echo "::warning::Falha ao inspecionar diretório remoto."
          echo "::endgroup::"


      # 6.95. Dry-run: compara o build local com o remoto e lista arquivos que
      #       SERIAM enviados/atualizados/removidos, SEM alterar nada na KingHost.
      #       Roda sempre; se o usuário disparou o workflow com dry_run=true,
      #       o step de deploy real é pulado logo abaixo.
      - name: "Dry-run FTP (simulação — não altera a KingHost)"
        id: ftp-dry-run
        env:
          FTP_HOST: ${{ secrets.KINGHOST_FTP_HOST }}
          FTP_USER: ${{ secrets.KINGHOST_FTP_USER }}
          FTP_PASS: ${{ secrets.KINGHOST_FTP_PASS }}
          FTP_DIR: ${{ steps.detect-public-dir.outputs.public_dir }}
          LOCAL_DIR: ${{ steps.locate-shell.outputs.deploy_dir }}
        run: |
          set -u
          echo "::group::Dry-run — configuração"
          echo "Local:  $LOCAL_DIR/"
          echo "Remoto: $FTP_DIR (SHA1-12 $(printf %s "$FTP_DIR" | sha1sum | cut -c1-12))"
          echo "Modo:   ${{ github.event.inputs.dry_run == 'true' && 'DRY-RUN (deploy real será pulado)' || 'preview antes do deploy real' }}"
          echo "::endgroup::"

          echo "::group::lftp mirror --dry-run (upload + delete-first, mesmas flags do deploy)"
          # Usa exatamente o mesmo conjunto de exclusões e o mesmo modo espelho
          # (--dangerous-clean-slate equivale a mirror -R --delete).
          lftp -u "$FTP_USER","$FTP_PASS" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 30;
            set net:max-retries 2;
            open -p 21 $FTP_HOST;
            lcd \"$LOCAL_DIR\";
            cd \"$FTP_DIR\";
            mirror --reverse --delete --verbose --dry-run \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              --exclude-glob .DS_Store;
            bye;
          " | tee /tmp/ftp-dry-run.log || {
            echo "::error::Falha ao executar dry-run via lftp."
            exit 1
          }
          echo "::endgroup::"

          echo "::group::Resumo do dry-run"
          uploads=$(grep -cE '^(Transferring file|put )' /tmp/ftp-dry-run.log || true)
          deletes=$(grep -cE '^(Removing (old file|old directory)|rm )' /tmp/ftp-dry-run.log || true)
          mkdirs=$(grep -cE '^(Making directory|mkdir )' /tmp/ftp-dry-run.log || true)
          echo "Arquivos que SERIAM enviados/atualizados: ${uploads:-0}"
          echo "Arquivos/pastas que SERIAM removidos:     ${deletes:-0}"
          echo "Pastas que SERIAM criadas:                ${mkdirs:-0}"
          echo "::endgroup::"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "::notice::🧪 DRY-RUN concluído. Nenhum arquivo foi alterado na KingHost. Rode o workflow novamente sem 'dry_run' para efetivar o deploy."
          fi

      - name: "Deploy FTP para KingHost (com retry)"
        if: github.event.inputs.dry_run != 'true'
        id: ftp-deploy
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          on_retry_command: echo "::warning::Tentativa de FTP falhou. Aguardando antes de tentar novamente..."
          command: |
            echo "::group::Tentativa de deploy FTP para KingHost"
            echo "Diretório local: ${{ steps.locate-shell.outputs.deploy_dir }}/"
            echo "Diretório remoto (auto-detectado): ${{ steps.detect-public-dir.outputs.public_dir }}"
            echo "Servidor: ${{ secrets.KINGHOST_FTP_HOST }}"
            echo "Iniciando em: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "::endgroup::"

            npx --yes @samkirkland/ftp-deploy@4.3.5 \
              --server "${{ secrets.KINGHOST_FTP_HOST }}" \
              --username "${{ secrets.KINGHOST_FTP_USER }}" \
              --password "${{ secrets.KINGHOST_FTP_PASS }}" \
              --local-dir "${{ steps.locate-shell.outputs.deploy_dir }}/" \
              --server-dir "${{ steps.detect-public-dir.outputs.public_dir }}" \
              --protocol ftps \
              --port 21 \
              --timeout 60000 \
              --log-level verbose \
              --dangerous-clean-slate true \
              --exclude "**/.git*" \
              --exclude "**/.git*/**" \
              --exclude "**/node_modules/**" \
              --exclude "**/.DS_Store"

            echo "Deploy FTP concluído em: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      # 7.1. Log final de status (roda mesmo se o step anterior falhar)
      - name: "Resumo do Deploy FTP"
        if: always()
        run: |
          if [ "${{ steps.ftp-deploy.outcome }}" = "success" ]; then
            echo "::notice::✅ Deploy FTP concluído com sucesso após ${{ steps.ftp-deploy.outputs.total_attempts || '1' }} tentativa(s)."
          else
            echo "::error::❌ Deploy FTP falhou após todas as tentativas. Verifique os logs verbosos acima (timeouts, credenciais, permissões de diretório, limite de conexões da KingHost)."
          fi

      # 8. Verificação pós-deploy: garante que os favicons são servidos como imagem
      #    (não caindo no SPA fallback com content-type text/html)
      - name: "Verificar favicons pós-deploy (falha se content-type=text/html)"
        if: steps.ftp-deploy.outcome == 'success'
        env:
          VERIFY_BASE_URL: ${{ secrets.KINGHOST_VERIFY_URL || 'https://nildacontabilidade.com.br' }}
        run: |
          set -u
          echo "Base URL de verificação: $VERIFY_BASE_URL"

          # Pequena espera para propagação (cache/CDN da hospedagem)
          sleep 10

          paths=(
            "/favicon-32x32.png"
            "/apple-touch-icon.png"
          )

          failed=0
          for p in "${paths[@]}"; do
            url="${VERIFY_BASE_URL%/}$p"
            echo "::group::Verificando $url"
            # -L segue redirects; -f não é usado para poder inspecionar respostas não-2xx
            headers=$(curl -sSIL --max-time 30 "$url" || true)
            echo "$headers"

            # Pega o último content-type (após redirects) e o último status HTTP
            ctype=$(echo "$headers" | awk 'BEGIN{IGNORECASE=1}/^content-type:/{v=$0} END{print v}' | tr -d '\r' | sed 's/^[Cc]ontent-[Tt]ype:[[:space:]]*//')
            status=$(echo "$headers" | awk '/^HTTP\//{s=$2} END{print s}')

            echo "Status: ${status:-desconhecido}"
            echo "Content-Type: ${ctype:-desconhecido}"

            if [ -z "$status" ] || [ "$status" -ge 400 ] 2>/dev/null; then
              echo "::error::$url retornou status HTTP $status."
              failed=1
            elif echo "$ctype" | grep -qi 'text/html'; then
              echo "::error::$url está servindo text/html (SPA fallback) em vez de image/*. Deploy não entregou o arquivo real."
              failed=1
            elif ! echo "$ctype" | grep -qi '^image/'; then
              echo "::warning::$url retornou content-type inesperado ($ctype). Esperado image/*."
            else
              echo "::notice::✅ $url OK ($ctype)"
            fi
            echo "::endgroup::"
          done

          if [ "$failed" -ne 0 ]; then
            echo "::error::❌ Verificação pós-deploy falhou: pelo menos um favicon não está sendo servido como imagem."
            exit 1
          fi
          echo "::notice::✅ Todos os favicons verificados retornam content-type de imagem."